name: CodeScan

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  schedule:
    - cron: '27 19 * * 2'

permissions:
  contents: read

jobs:
  CodeScan:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX: Java 17 required for modern SonarQube
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java version
        run: java -version

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.CODESCAN_AUTH_TOKEN }}" ]; then
            echo "Error: CODESCAN_AUTH_TOKEN secret is not configured"
            exit 1
          fi

          if [ -z "${{ secrets.CODESCAN_ORGANIZATION_KEY }}" ]; then
            echo "Error: CODESCAN_ORGANIZATION_KEY secret is not configured"
            exit 1
          fi

          if [ -z "${{ secrets.CODESCAN_PROJECT_KEY }}" ]; then
            echo "Error: CODESCAN_PROJECT_KEY secret is not configured"
            exit 1
          fi

          echo "✓ All required secrets are configured"

      - name: Cache Sonar files
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run Analysis
        uses: codescan-io/codescan-scanner-action@master
        with:
          login: ${{ secrets.CODESCAN_AUTH_TOKEN }}
          organization: ${{ secrets.CODESCAN_ORGANIZATION_KEY }}
          projectKey: ${{ secrets.CODESCAN_PROJECT_KEY }}

        env:
          SONAR_SCANNER_OPTS: "-Xmx512m"

      - name: Upload SARIF file
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codescan.sarif

        continue-on-error: true